name: docs

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  # Stage 1: build the engine and run its test suite. This is the gate.
  # If it fails, the deploy job below never runs, so broken engine code
  # does not publish documentation.
  build:
    name: Build engine and run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # GLFW (pulled by the engine via xrepo) needs the X11/OpenGL dev
      # headers to build; xvfb + the mesa software rasteriser give the
      # test binary a headless GL context to run against.
      - name: Install engine build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xorg-dev libgl1-mesa-dev libglu1-mesa-dev libglew-dev \
            libgl1-mesa-dri xvfb

      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Cache xmake packages
        uses: actions/cache@v5
        with:
          path: ~/.xmake
          key: xmake-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-${{ runner.os }}-

      - name: Build the engine
        run: xmake build -y okinawa

      - name: Build the test suite
        run: xmake build -y okinawa_test

      - name: Run the test suite
        run: xvfb-run -a xmake run okinawa_test

  # Stage 2: build the docs generator and publish the site to Pages.
  # Runs only after the build stage succeeds (needs: build).
  deploy:
    name: Build and deploy the docs site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Cache xmake packages
        uses: actions/cache@v5
        with:
          path: ~/.xmake
          key: xmake-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-${{ runner.os }}-

      - name: Build the docs generator
        # The generator is a standalone xmake project (docs/tool) that pulls
        # only md4c, so this deploy job needs no OpenGL/X11/GLEW dependencies.
        run: xmake build -P docs/tool -y okinawa-docs

      - name: Generate the site
        run: xmake run -P docs/tool okinawa-docs --in docs/content --out docs/dist --base-url /okinawa --static docs/static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
