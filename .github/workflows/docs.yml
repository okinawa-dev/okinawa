name: docs

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up xmake
        uses: xmake-io/setup-xmake@v1

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: ~/.xmake
          key: xmake-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-${{ runner.os }}-

      - name: Build the docs generator
        run: xmake build -y okinawa-docs

      - name: Generate the site
        run: xmake run okinawa-docs --in docs/content --out docs/dist --base-url /okinawa.cpp --static docs/static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
